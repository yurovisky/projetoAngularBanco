<div class="container py-4">
  <h3 class="mb-4">Transferências</h3>

  <div class="row g-4">
    <div class="col-12 col-md-6">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body d-flex flex-column justify-content-between">
          <div>
            <i class="fa-solid fa-bolt fa-2x text-primary mb-3"></i>
            <h5 class="card-title">PIX</h5>
            <p class="card-text text-muted">
              Transferência instantânea para qualquer banco.
            </p>
          </div>

          <button
            class="btn btn-primary w-100 mt-3"
            (click)="routerService.setToPage(Pages.PIX)"
          >
            Fazer PIX
          </button>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body d-flex flex-column justify-content-between">
          <div>
            <i class="fa-solid fa-globe fa-2x text-success mb-3"></i>
            <h5 class="card-title">Transferência Internacional</h5>
            <p class="card-text text-muted">
              Envie dinheiro para o exterior com segurança.
            </p>
          </div>

          <button
            class="btn btn-success w-100 mt-3"
            (click)="routerService.setToPage(Pages.TRANSFERENCIAS_OUTRAS)"
          >
            Transferir
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
